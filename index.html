<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreDeck</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TITLE BAR -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <div class="app-logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="7" height="7" rx="2" fill="#6c63ff"/>
          <rect x="10" y="1" width="7" height="7" rx="2" fill="#4ecdc4"/>
          <rect x="1" y="10" width="7" height="7" rx="2" fill="#4ecdc4"/>
          <rect x="10" y="10" width="7" height="7" rx="2" fill="#6c63ff"/>
        </svg>
      </div>
      <span class="app-name">CoreDeck</span>
    </div>
    <div class="titlebar-center" id="drag-region"></div>
    <div class="titlebar-right">
      <button class="win-btn" id="btn-minimize" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1.5" rx="0.75" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="btn-maximize" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="win-btn close-btn" id="btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SEARCH FOCUS OVERLAY — dims background when search is focused -->
    <div class="search-focus-overlay" id="search-focus-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Filter</div>
        <button class="filter-btn active" data-filter="all">
          <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor" opacity="0.8"/><rect x="8" y="1" width="5" height="5" rx="1" fill="currentColor" opacity="0.8"/><rect x="1" y="8" width="5" height="5" rx="1" fill="currentColor" opacity="0.8"/><rect x="8" y="8" width="5" height="5" rx="1" fill="currentColor" opacity="0.8"/></svg>
          All Items
        </button>
        <button class="filter-btn" data-filter="url">
          <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M7 1.5C7 1.5 5 4 5 7s2 5.5 2 5.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M7 1.5C7 1.5 9 4 9 7s-2 5.5-2 5.5" stroke="currentColor" stroke-width="1.3" fill="none"/><line x1="1.5" y1="7" x2="12.5" y2="7" stroke="currentColor" stroke-width="1.3"/></svg>
          URLs
        </button>
        <button class="filter-btn" data-filter="app">
          <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/><line x1="1" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1.2"/></svg>
          Apps
        </button>
        <button class="filter-btn" data-filter="file">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 1.5h5l3 3v8a.5.5 0 01-.5.5h-7a.5.5 0 01-.5-.5v-11a.5.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M8 1.5V4.5h3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
          Files
        </button>
        <button class="filter-btn" data-filter="folder">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 3.5h4l1.5 2H13a.5.5 0 01.5.5v6a.5.5 0 01-.5.5H1a.5.5 0 01-.5-.5v-8a.5.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
          Folders
        </button>
      </div>

      <div class="sidebar-section" id="tags-section">
        <div class="sidebar-label">Tags</div>
        <div id="tag-cloud"></div>
      </div>

      <div class="sidebar-bottom">
        <button class="add-btn" id="add-btn">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Add Item
        </button>
        <button class="add-btn add-flow-btn" id="flows-panel-btn" style="margin-top:6px;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="7" r="2" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="7" x2="9" y2="7" stroke="currentColor" stroke-width="1.4"/></svg>
          Flows
        </button>
        <button class="add-btn add-flow-btn" id="flow-builder-btn" style="margin-top:4px;opacity:0.8;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Add Flow
        </button>
        <div class="theme-row">
          <div class="sidebar-label">Theme</div>
          <select id="theme-select" class="theme-select">
            <option value="obsidian">Obsidian</option>
            <option value="frost">Frost</option>
            <option value="ember">Ember</option>
            <option value="void">Void</option>
            <option value="cyber">Cyber</option>
            <option value="yin">Yin</option>
            <option value="steel">Steel</option>
            <option value="gold">Gold</option>
          </select>
        </div>
        <div class="data-path-hint" id="data-path-hint" title="Data file location">&#x1F4C1; data.json</div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 15 15"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Type to search, or use &gt; commands…" autocomplete="off" spellcheck="false" />
          <kbd class="search-hint">/</kbd>
        </div>
        <div class="item-count" id="item-count">0 items</div>
      </div>

      <div class="active-tag-bar" id="active-tag-bar" style="display:none;">
        <span>Tag:</span>
        <span id="active-tag-label"></span>
        <button class="clear-tag-btn" id="clear-tag-btn">&#x2715; Clear</button>
      </div>

      <div class="cards-grid" id="cards-grid"></div>

      <div class="empty-state" id="empty-state" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="4" width="18" height="18" rx="4" stroke="#3a3a4e" stroke-width="2"/><rect x="26" y="4" width="18" height="18" rx="4" stroke="#3a3a4e" stroke-width="2"/><rect x="4" y="26" width="18" height="18" rx="4" stroke="#3a3a4e" stroke-width="2"/><rect x="26" y="26" width="18" height="18" rx="4" stroke="#3a3a4e" stroke-width="2"/></svg>
        <p id="empty-state-msg">No results found</p>
        <span id="empty-state-hint">Try a different search or add a new item</span>
      </div>
    </main>

    <!-- RIGHT PANEL (NOTES) -->
    <aside class="right-panel" id="right-panel">
      <div class="panel-header">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 2h10v10H2z" stroke="currentColor" stroke-width="1.3" fill="none" rx="1"/><line x1="4" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="4" y1="7.5" x2="10" y2="7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="4" y1="10" x2="7" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span>Notes</span>
        <span class="save-indicator" id="save-indicator"></span>
      </div>
      <textarea id="notes-area" class="notes-area" placeholder="Jot down anything useful here...&#10;&#10;This auto-saves as you type."></textarea>
    </aside>

  </div>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add Item</h2>
        <button class="modal-close" id="modal-close">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label for="item-name">Name</label>
          <input type="text" id="item-name" placeholder="e.g. Google Chrome" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="item-type">Type</label>
          <div class="type-selector" id="type-selector">
            <button class="type-btn active" data-type="url">
              <svg width="13" height="13" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M7 1.5C7 1.5 5 4 5 7s2 5.5 2 5.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M7 1.5C7 1.5 9 4 9 7s-2 5.5-2 5.5" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="1.5" y1="7" x2="12.5" y2="7" stroke="currentColor" stroke-width="1.2"/></svg>
              URL
            </button>
            <button class="type-btn" data-type="app">
              <svg width="13" height="13" viewBox="0 0 14 14"><rect x="1" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/><line x1="1" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1.2"/></svg>
              App
            </button>
            <button class="type-btn" data-type="file">
              <svg width="13" height="13" viewBox="0 0 14 14"><path d="M3 1.5h5l3 3v8a.5.5 0 01-.5.5h-7a.5.5 0 01-.5-.5v-11a.5.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M8 1.5V4.5h3" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
              File
            </button>
            <button class="type-btn" data-type="folder">
              <svg width="13" height="13" viewBox="0 0 14 14"><path d="M1 3.5h4l1.5 2H13a.5.5 0 01.5.5v6a.5.5 0 01-.5.5H1a.5.5 0 01-.5-.5v-8a.5.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
              Folder
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="item-path" id="path-label">URL or Path</label>
          <input type="text" id="item-path" placeholder="https://example.com" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="item-tags">Tags <span class="label-hint">(comma separated)</span></label>
          <input type="text" id="item-tags" placeholder="work, tools, web" autocomplete="off" />
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn-primary" id="modal-save">Add Item</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- CONTEXT MENU -->
  <div class="context-menu" id="context-menu" style="display:none;">
    <button class="ctx-btn" id="ctx-open">
      <svg width="13" height="13" viewBox="0 0 14 14"><path d="M2 7L7 2l5 5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Open
    </button>
    <button class="ctx-btn" id="ctx-edit">
      <svg width="13" height="13" viewBox="0 0 14 14"><path d="M9.5 2.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
      Edit
    </button>
    <div class="ctx-divider"></div>
    <button class="ctx-btn danger" id="ctx-delete">
      <svg width="13" height="13" viewBox="0 0 14 14"><path d="M2 4h10M5 4V2.5h4V4M5.5 6v5M8.5 6v5M3 4l.7 8h6.6L11 4" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Delete
    </button>
  </div>

  <!-- FLOWS PANEL OVERLAY -->
  <div class="flows-panel-overlay" id="flows-panel-overlay" style="display:none;">
    <div class="flows-panel">
      <div class="flows-panel-header">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="3" cy="8" r="2.2" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="13" cy="8" r="2.2" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="8" cy="3" r="2.2" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="8" cy="13" r="2.2" stroke="currentColor" stroke-width="1.4"/>
          <line x1="5.2" y1="8" x2="10.8" y2="8" stroke="currentColor" stroke-width="1.3" stroke-dasharray="1.5 1.5"/>
          <line x1="8" y1="5.2" x2="8" y2="10.8" stroke="currentColor" stroke-width="1.3" stroke-dasharray="1.5 1.5"/>
        </svg>
        <span>Flows</span>
        <button class="modal-close" id="flows-panel-close" title="Close">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="flows-panel-body" id="flows-panel-body"></div>
      <div class="flows-panel-footer">
        <button class="btn-primary" id="flows-panel-add-btn">
          <svg width="13" height="13" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Add New Flow
        </button>
      </div>
    </div>
  </div>

  <!-- FLOW BUILDER OVERLAY -->
  <div class="fb-overlay" id="fb-overlay" style="display:none;">
    <div class="fb-modal">
      <div class="fb-header">
        <span class="fb-title">Flow Builder</span>
        <button class="modal-close" id="fb-cancel-btn">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="fb-body">
        <div class="form-group">
          <label for="fb-flow-name">Flow name</label>
          <input type="text" id="fb-flow-name" placeholder="e.g. morning, work, dev" autocomplete="off" />
        </div>
        <div class="fb-steps-label">
          <span>Steps</span>
          <button class="fb-add-step" id="fb-add-step-btn">+ Add step</button>
        </div>
        <div class="fb-steps-list" id="fb-steps-list"></div>
      </div>
      <div class="fb-footer">
        <button class="btn-secondary" id="fb-cancel-btn2" onclick="document.getElementById('fb-overlay').style.display='none'">Cancel</button>
        <button class="btn-primary" id="fb-save-btn">Save Flow</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>

</body>
</html>
